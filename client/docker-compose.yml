version: '3.9'

services:
  client:
    container_name: stremify-client
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - ./client/.env
    volumes:
      - .:/app
      - /app/node_modules
    restart: always
    networks:
      - stremify-network
networks:
  stremify-network:
    driver: bridge


